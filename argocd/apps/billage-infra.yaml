apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billage-infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: billage
    component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: billage
  source:
    repoURL: 'https://github.com/your-org/billage-k8s-manifests.git'  # TODO: 실제 repo URL로 변경
    targetRevision: main
    path: base
    directory:
      recurse: true
      include: '*.yaml'
      exclude: '*-example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: false  # 인프라는 수동 prune
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
  revisionHistoryLimit: 10
