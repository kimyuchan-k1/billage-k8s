apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rabbitmq.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
data:
  rabbitmq.conf: |
    ## Cluster formation
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.k8s.service_name = {{ include "rabbitmq.fullname" . }}-headless
    cluster_formation.k8s.hostname_suffix = .{{ include "rabbitmq.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local

    ## Memory watermark (absolute)
    vm_memory_high_watermark.absolute = {{ .Values.config.memoryHighWatermark }}

    ## Disk free limit
    disk_free_limit.absolute = {{ .Values.config.diskFreeLimit }}

    ## Default queue type
    default_queue_type = quorum

    ## Management plugin
    management.tcp.port = 15672
