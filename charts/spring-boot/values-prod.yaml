# Spring Boot - Prod 환경

replicaCount: 3

image:
  tag: "latest"  # CI가 commit sha로 업데이트

resources:
  requests:
    cpu: "750m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

probes:
  startup:
    enabled: true
    failureThreshold: 30

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPU: 70
  scaleDownStabilization: 300

pdb:
  enabled: true
  minAvailable: "66%"

env: []

envFromSecret:
  # Profile
  - name: SPRING_PROFILES_ACTIVE
    secretName: spring-boot-secret
    key: spring-profiles-active
  # Logging
  - name: LOGGING_LEVEL
    secretName: spring-boot-secret
    key: logging-level
  # DB
  - name: PROD_DB_URL
    secretName: spring-boot-secret
    key: prod-db-url
  - name: PROD_DB_USERNAME
    secretName: spring-boot-secret
    key: prod-db-username
  - name: PROD_DB_PASSWORD
    secretName: spring-boot-secret
    key: prod-db-password
  # Auth
  - name: JWT_SECRET_KEY
    secretName: spring-boot-secret
    key: jwt-secret-key
  - name: ACCESS_DURATION
    secretName: spring-boot-secret
    key: access-duration
  - name: REFRESH_DURATION
    secretName: spring-boot-secret
    key: refresh-duration
  # CORS
  - name: CORS_ALLOWED_ORIGIN
    secretName: spring-boot-secret
    key: cors-allowed-origin
  # AI
  - name: PROD_AI_BASE_URL
    secretName: spring-boot-secret
    key: prod-ai-base-url
  - name: PROD_AI_TIMEOUT_SECONDS
    secretName: spring-boot-secret
    key: prod-ai-timeout-seconds
  # RabbitMQ
  - name: RABBITMQ_ENABLED
    secretName: spring-boot-secret
    key: rabbitmq-enabled
  - name: RABBITMQ_STOMP_USERNAME
    secretName: spring-boot-secret
    key: rabbitmq-stomp-username
  - name: RABBITMQ_STOMP_PASSWORD
    secretName: spring-boot-secret
    key: rabbitmq-stomp-password
  - name: RABBITMQ_STOMP_HOST
    secretName: spring-boot-secret
    key: rabbitmq-stomp-host
  - name: RABBITMQ_STOMP_PORT
    secretName: spring-boot-secret
    key: rabbitmq-stomp-port
  # Kafka
  - name: KAFKA_BOOTSTRAP_SERVERS
    secretName: spring-boot-secret
    key: kafka-bootstrap-servers
  # S3
  - name: S3_ACCESS_KEY
    secretName: spring-boot-secret
    key: s3-access-key
  - name: S3_SECRET_KEY
    secretName: spring-boot-secret
    key: s3-secret-key
  - name: S3_BUCKET
    secretName: spring-boot-secret
    key: s3-bucket
  - name: S3_REGION
    secretName: spring-boot-secret
    key: s3-region
  # FCM
  - name: FCM_PROJECT_ID
    secretName: spring-boot-secret
    key: fcm-project-id
  - name: FCM_JSON
    secretName: spring-boot-secret
    key: fcm-json
