# Spring Boot - Dev 환경

replicaCount: 1

image:
  tag: "latest"  # CI가 commit sha로 업데이트

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

probes:
  startup:
    enabled: true
    failureThreshold: 20  # dev는 더 여유있게

hpa:
  enabled: false

pdb:
  enabled: false

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"

envFromSecret:
  - name: DB_URL
    secretName: spring-boot-secret
    key: db-url
  - name: DB_USERNAME
    secretName: spring-boot-secret
    key: db-username
  - name: DB_PASSWORD
    secretName: spring-boot-secret
    key: db-password
  - name: JWT_SECRET
    secretName: spring-boot-secret
    key: jwt-secret
  - name: CORS_ALLOWED
    secretName: spring-boot-secret
    key: cors-allowed
  - name: AI_BASE_URL
    secretName: spring-boot-secret
    key: ai-base-url

ssmPath: "/billage/dev/be/"
