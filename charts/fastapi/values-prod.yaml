# FastAPI - Prod 환경

replicaCount: 2

image:
  repository: "<AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/billage-ai"
  tag: "latest"

resources:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 50
  scaleDownStabilization: 300

pdb:
  enabled: true
  minAvailable: "50%"

env:
  - name: ENV
    value: "prod"

envFromSecret:
  - name: QDRANT_URL
    secretName: fastapi-secret
    key: qdrant-url
  - name: DB_URL
    secretName: fastapi-secret
    key: db-url
