# Next.js - Dev 환경

replicaCount: 1

image:
  tag: "latest"  # CI가 commit sha로 업데이트

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: false

pdb:
  enabled: false

env:
  - name: NEXT_PUBLIC_API_URL
    value: "https://dev-api.billages.com"
  - name: NEXTAUTH_URL
    value: "https://dev.billages.com"
  - name: AUTH_TRUST_HOST
    value: "true"
