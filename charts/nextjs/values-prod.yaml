# Next.js - Prod 환경

replicaCount: 2

image:
  tag: "latest"  # CI가 commit sha로 업데이트

resources:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
  scaleDownStabilization: 300

pdb:
  enabled: true
  minAvailable: "50%"

env:
  - name: NEXT_PUBLIC_API_URL
    value: "https://api.billages.com"
  - name: NEXTAUTH_URL
    value: "https://billages.com"
  - name: AUTH_TRUST_HOST
    value: "true"
