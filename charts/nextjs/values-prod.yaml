# Next.js - Prod 환경

replicaCount: 2

image:
  repository: "<AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/billage-fe"
  tag: "latest"

resources:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
  scaleDownStabilization: 300

pdb:
  enabled: true
  minAvailable: "50%"

env:
  - name: NEXT_PUBLIC_API_URL
    value: "https://api.billages.com"
  - name: NEXTAUTH_URL
    value: "https://billages.com"
  - name: AUTH_TRUST_HOST
    value: "true"
