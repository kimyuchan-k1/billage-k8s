# Next.js - Prod 환경

replicaCount: 2

image:
  tag: "latest"  # CI가 commit sha로 업데이트

resources:
  requests:
    cpu: "300m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70
  scaleDownStabilization: 300

pdb:
  enabled: true
  minAvailable: "50%"

env: []

envFromSecret:
  - name: NEXT_PUBLIC_API_URL
    secretName: nextjs-secret
    key: next-public-api-url
  - name: NEXTAUTH_URL
    secretName: nextjs-secret
    key: nextauth-url
  - name: NEXTAUTH_SECRET
    secretName: nextjs-secret
    key: nextauth-secret
  - name: AUTH_TRUST_HOST
    secretName: nextjs-secret
    key: auth-trust-host
  - name: NODE_ENV
    secretName: nextjs-secret
    key: node-env
