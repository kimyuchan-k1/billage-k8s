# ============================================================
# Secret 생성 가이드
# ============================================================
# 이 파일은 예시입니다. 실제 값을 넣어 사용하세요.
# 주의: 이 파일을 Git에 커밋하지 마세요! (.gitignore에 포함됨)
#
# 생성 방법 1: kubectl 명령어 (권장)
#   kubectl create secret generic spring-boot-secret \
#     --from-literal=db-url='jdbc:mysql://rds-endpoint:3306/billage' \
#     --from-literal=db-username='admin' \
#     --from-literal=db-password='YOUR_PASSWORD' \
#     --from-literal=jwt-secret='YOUR_JWT_SECRET' \
#     --from-literal=cors-allowed='https://billages.com' \
#     --from-literal=ai-base-url='http://fastapi.village-app:5000' \
#     -n village-app
#
# 생성 방법 2: 이 파일을 복사 → 값 입력 → kubectl apply
#   cp secrets-example.yaml secrets-prod.yaml
#   (값 입력)
#   kubectl apply -f secrets-prod.yaml
#
# SSM Parameter Store 경로 참고:
#   /billage/{env}/be/db-url
#   /billage/{env}/be/db-username
#   /billage/{env}/be/db-password
#   /billage/{env}/be/jwt-secret
#   /billage/{env}/be/cors-allowed
#   /billage/{env}/be/ai-base-url
# ============================================================

---
# Spring Boot Secret
apiVersion: v1
kind: Secret
metadata:
  name: spring-boot-secret
  namespace: village-app
type: Opaque
stringData:
  db-url: "jdbc:mysql://<RDS_ENDPOINT>:3306/billage"
  db-username: "<DB_USERNAME>"
  db-password: "<DB_PASSWORD>"
  jwt-secret: "<JWT_SECRET>"
  cors-allowed: "https://billages.com"
  ai-base-url: "http://fastapi.village-app.svc.cluster.local:5000"

---
# FastAPI Secret
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: village-app
type: Opaque
stringData:
  qdrant-url: "http://qdrant.village-data.svc.cluster.local:6333"
  db-url: "mysql://<RDS_ENDPOINT>:3306/billage"

---
# RabbitMQ Erlang Cookie
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: village-data
type: Opaque
stringData:
  erlang-cookie: "<RANDOM_ERLANG_COOKIE>"
  # 생성: openssl rand -hex 32
