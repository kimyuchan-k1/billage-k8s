# Billage v3 Ingress 라우팅 규칙
# v3.billages.com → Next.js, api-v3.billages.com → Spring Boot / FastAPI

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billage-ingress
  namespace: billage-app
  annotations:
    # Ingress Controller
    kubernetes.io/ingress.class: nginx

    # cert-manager TLS 자동 발급
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # SSL 리다이렉트
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # 파일 업로드 (이미지)
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"

    # WebSocket 지원 — /ws/* 경로용
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # WebSocket upgrade (nginx가 자동으로 Upgrade header 처리)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - v3.billages.com
        - api-v3.billages.com
      secretName: billage-v3-tls
  rules:
    # 프론트엔드: v3.billages.com → Next.js
    - host: v3.billages.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs
                port:
                  number: 3000

    # API: api-v3.billages.com → 서비스별 라우팅
    - host: api-v3.billages.com
      http:
        paths:
          # REST API → Spring Boot
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spring-boot
                port:
                  number: 8080

          # WebSocket (채팅/알림) → Spring Boot
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: spring-boot
                port:
                  number: 8080

          # AI API → FastAPI
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: fastapi
                port:
                  number: 5000
