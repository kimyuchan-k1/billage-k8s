name: AI Dev CD (Docker + ECR + ArgoCD)

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: billage-ai
  MANIFEST_REPO: your-org/billage-k8s-manifests  # TODO: 실제 레포로 변경

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: develop

      - name: Update Image Tag
        run: |
          cd charts/fastapi
          sed -i "s/tag: .*/tag: \"${{ needs.build-and-push.outputs.image-tag }}\"/" values-dev.yaml

          echo "📝 Updated image tag to: ${{ needs.build-and-push.outputs.image-tag }}"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/fastapi/values-dev.yaml
          git commit -m "chore(ai): update dev image to ${{ needs.build-and-push.outputs.image-tag }}

          Source commit: ${{ github.repository }}@${{ github.sha }}"

          git push

      - name: Discord - Deploy Triggered
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"embeds": [{"title": "🚀 [DEV] AI 배포 시작", "color": 65280, "fields": [{"name": "Image Tag", "value": "`${{ needs.build-and-push.outputs.image-tag }}`", "inline": true}]}]}' \
            ${{ secrets.DISCORD_WEBHOOK }} || true

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, update-manifest]
    if: failure()

    steps:
      - name: Discord Notification
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"content": "@here", "embeds": [{"title": "❌ [DEV] AI 배포 실패", "color": 16711680, "fields": [{"name": "Commit", "value": "`${{ github.sha }}`", "inline": true}]}]}' \
            ${{ secrets.DISCORD_WEBHOOK }} || true
