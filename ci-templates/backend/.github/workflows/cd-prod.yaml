name: Backend Prod CD (Docker + ECR + ArgoCD)

on:
  push:
    branches: [main]
    paths:
      - 'ktb-billage-*/src/**'
      - 'ktb-billage-*/build.gradle'
      - '**/build.gradle*'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'Dockerfile'

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: '25'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: billage-be
  MANIFEST_REPO: your-org/billage-k8s-manifests  # TODO: 실제 레포로 변경

# ============================================================
# 배포 흐름 (K8s + ArgoCD):
# 1. Build & Unit Test
# 2. Integration Test (prod only)
# 3. Docker 빌드 → ECR Push
# 4. manifest 레포 이미지 태그 업데이트
# 5. ArgoCD에서 수동 Sync 필요 (prod는 auto-sync 비활성화)
# ============================================================

jobs:
  # ============================================================
  # Job 1: Build & Unit Test
  # ============================================================
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Lint Analysis
        run: ./gradlew checkstyleMain --no-daemon

      - name: Build
        run: ./gradlew build -x test --no-daemon

      - name: Unit Test
        env:
          LOCAL_DB_URL: jdbc:mysql://localhost:3306/testdb
          LOCAL_DB_USERNAME: root
          LOCAL_DB_PASSWORD: test
          CORS_ALLOWED_ORIGIN: "http://localhost:3000"
          JWT_SECRET_KEY: "test-secret-key-for-ci-pipeline-do-not-use-in-production"
          ACCESS_DURATION: "3600000"
          REFRESH_DURATION: "604800000"
        run: ./gradlew test --no-daemon

      - name: Rename JAR
        run: mv ktb-billage-api/build/libs/ktb-billage-api.jar app.jar

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: app.jar
          retention-days: 1

  # ============================================================
  # Job 2: Integration Test (Prod only)
  # ============================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Integration Tests
        env:
          LOCAL_DB_URL: jdbc:mysql://localhost:3306/testdb
          LOCAL_DB_USERNAME: root
          LOCAL_DB_PASSWORD: test
          CORS_ALLOWED_ORIGIN: "http://localhost:3000"
          JWT_SECRET_KEY: "test-secret-key-for-ci-pipeline-do-not-use-in-production"
          ACCESS_DURATION: "3600000"
          REFRESH_DURATION: "604800000"
        run: ./gradlew integrationTest --no-daemon

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: integration-test-results
          path: '**/build/reports/tests/integrationTest/'
          retention-days: 7

  # ============================================================
  # Job 3: Docker 빌드 & ECR Push
  # ============================================================
  docker-build-push:
    name: Docker Build & ECR Push
    runs-on: ubuntu-latest
    needs: [build-and-test, integration-test]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: .

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trigger ECR Scan
        continue-on-error: true
        run: |
          aws ecr start-image-scan \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.meta.outputs.version }}

  # ============================================================
  # Job 4: Update Manifest Repo
  # ============================================================
  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: main

      - name: Update Image Tag
        run: |
          cd charts/spring-boot
          sed -i "s/tag: .*/tag: \"${{ needs.docker-build-push.outputs.image-tag }}\"/" values-prod.yaml

          echo "📝 Updated image tag to: ${{ needs.docker-build-push.outputs.image-tag }}"
          cat values-prod.yaml | grep -A2 "image:"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/spring-boot/values-prod.yaml
          git commit -m "chore(be): update prod image to ${{ needs.docker-build-push.outputs.image-tag }}

          Source commit: ${{ github.repository }}@${{ github.sha }}"

          git push

      - name: Discord - Ready for Deploy
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"embeds": [{"title": "📦 [PROD] Backend 이미지 준비 완료", "color": 16776960, "fields": [{"name": "Image Tag", "value": "`${{ needs.docker-build-push.outputs.image-tag }}`", "inline": true}, {"name": "다음 단계", "value": "ArgoCD에서 수동 Sync 필요", "inline": true}]}]}' \
            ${{ secrets.DISCORD_WEBHOOK }} || true

  # ============================================================
  # 실패 알림
  # ============================================================
  notify-failure:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, integration-test, docker-build-push, update-manifest]
    if: failure()

    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{"content": "@here", "embeds": [{"title": "❌ [PROD] Backend CI/CD 실패", "color": 16711680, "fields": [{"name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true}, {"name": "Commit", "value": "`${{ github.sha }}`", "inline": true}]}]}' \
            ${{ secrets.DISCORD_WEBHOOK }} || true
